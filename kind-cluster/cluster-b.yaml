kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: b-cluster

networking:
  disableDefaultCNI: true  # Required for Cilium
  kubeProxyMode: none      # Cilium replaces kube-proxy
  podSubnet: "10.245.0.0/16"
  serviceSubnet: "10.97.0.0/16"

nodes:
  # --- Control Plane Nodes ---
  - role: control-plane
    name: control-plane-00
  - role: control-plane
    name: control-plane-01
  - role: control-plane
    name: control-plane-02

  # --- Worker Nodes ---
  - role: worker
    name: worker-00
  - role: worker
    name: worker-01
  - role: worker
    name: worker-02
  - role: worker
    name: worker-03

  # --- Network Nodes — tainted + labelled post-creation via setup.sh ---
  - role: worker
    name: network-00   # haproxy-shard-1
  - role: worker
    name: network-01   # haproxy-shard-2
